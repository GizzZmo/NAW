name: Neural Engine Tests

on:
  push:
    branches: [ main, develop, copilot/** ]
    paths:
      - 'neural-engine/**'
      - 'package.json'
      - 'tsconfig.json'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'neural-engine/**'
      - 'package.json'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  test-neural-engine:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 9.15.9

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Run neural engine tests
      run: pnpm test
    
    - name: Run neural engine demo
      run: pnpm run demo
    
    - name: Verify neural engine architecture
      run: |
        echo "Verifying neural engine components..."
        
        # Phase 2: Core neural engine
        test -f neural-engine/index.ts
        test -f neural-engine/codec/DACCodec.ts
        test -f neural-engine/planner/SemanticPlanner.ts
        test -f neural-engine/renderer/AcousticRenderer.ts
        test -f neural-engine/demo.ts
        test -f neural-engine/test.ts
        
        # Phase 3: Advanced features
        test -f neural-engine/control/ControlNet.ts
        test -f neural-engine/conditioning/CLAP.ts
        test -f neural-engine/inpainting/SpectrogramInpainter.ts
        
        echo "✓ All neural engine components present"
